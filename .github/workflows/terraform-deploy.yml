# terraform-branch-deploy v0.2.0 - Single Job Architecture
#
# The trigger/execute pattern uses CONDITIONAL STEPS in a SINGLE JOB.
# This allows custom steps (credential injection) between phases while
# environment variables persist automatically via GITHUB_ENV.

name: Terraform Deploy
run-name: "TBD #${{ github.event.issue.number }} comment ${{ github.event.comment.id }}"

on:
  issue_comment:
    types: [created]

permissions:
  pull-requests: write
  deployments: write
  contents: write
  checks: read
  statuses: read

concurrency:
  group: terraform-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event.issue.pull_request
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout first (so config file exists)
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Resolve terraform-branch-deploy ref
        id: tfbd-ref
        shell: bash
        env:
          TF_BRANCH_DEPLOY_REF: ${{ vars.TF_BRANCH_DEPLOY_REF }}
        run: |
          ref="${TF_BRANCH_DEPLOY_REF}"
          if [ -z "$ref" ]; then
            ref="$(tr -d '[:space:]' < .github/terraform-branch-deploy-ref)"
          fi

          if [ -z "$ref" ] || [ "$ref" = "main" ]; then
            echo "::error::Set TF_BRANCH_DEPLOY_REF or .github/terraform-branch-deploy-ref to a release tag or commit SHA"
            exit 1
          fi

          delimiter="TFBD_ref_$(date +%s%N)_${RANDOM}"
          while [[ "$ref" == *"$delimiter"* ]]; do
            delimiter="TFBD_ref_$(date +%s%N)_${RANDOM}"
          done
          {
            printf 'ref<<%s\n' "$delimiter"
            printf '%s\n' "$ref"
            printf '%s\n' "$delimiter"
          } >> "$GITHUB_OUTPUT"

      - name: Validate terraform-branch-deploy ref
        shell: bash
        env:
          TFBD_REF: ${{ steps.tfbd-ref.outputs.ref }}
        run: |
          if ! [[ "${TFBD_REF}" =~ ^v[0-9]+(\.[0-9]+){0,2}$ || "${TFBD_REF}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::TF_BRANCH_DEPLOY_REF must be a release tag or full commit SHA"
            exit 1
          fi

      - name: Checkout terraform-branch-deploy candidate
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: scarowar/terraform-branch-deploy
          ref: ${{ steps.tfbd-ref.outputs.ref }}
          path: .terraform-branch-deploy-action

      # 2. TRIGGER MODE - Parse command, export TF_BD_* to GITHUB_ENV
      - name: Trigger
        uses: ./.terraform-branch-deploy-action
        with:
          mode: trigger
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # ============================================================
      # CUSTOM STEPS GO HERE
      # All TF_BD_* environment variables are available:
      #   - TF_BD_CONTINUE (true/false)
      #   - TF_BD_ENVIRONMENT (dev, prod, etc.)
      #   - TF_BD_OPERATION (plan, apply)
      #   - TF_BD_SHA
      #   - TF_BD_REF
      #   - TF_BD_IS_ROLLBACK
      #   - etc.
      # ============================================================
      
      # Example: Environment-specific credentials
      # - name: Assume AWS Role
      #   if: env.TF_BD_CONTINUE == 'true'
      #   uses: aws-actions/configure-aws-credentials@v4
      #   with:
      #     role-to-assume: ${{ env.TF_BD_ENVIRONMENT == 'prod' && 'arn:aws:iam::PROD' || 'arn:aws:iam::DEV' }}

      # 3. Checkout the correct ref (PR branch)
      - name: Checkout PR Branch
        if: env.TF_BD_CONTINUE == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.TF_BD_REF }}

      - name: Checkout terraform-branch-deploy candidate for execute
        if: env.TF_BD_CONTINUE == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: scarowar/terraform-branch-deploy
          ref: ${{ steps.tfbd-ref.outputs.ref }}
          path: .terraform-branch-deploy-action

      # 4. EXECUTE MODE - Run terraform, complete lifecycle
      #    Picks up ALL env vars automatically (same job)
      - name: Execute
        if: env.TF_BD_CONTINUE == 'true'
        uses: ./.terraform-branch-deploy-action
        with:
          mode: execute
          github-token: ${{ secrets.GITHUB_TOKEN }}
