name: E2E Tests

on:
  workflow_dispatch:
    inputs:
      candidate_ref:
        description: "Terraform Branch Deploy commit SHA or release tag. Empty uses the existing test repo ref."
        required: false
        default: ""
      source_pr:
        description: "Terraform Branch Deploy pull request number for status reporting."
        required: false
        default: ""
      stage:
        description: "Certification stage."
        required: false
        default: "all"
        type: choice
        options:
          - all
          - critical
          - core
          - stateful
          - args
          - edge
          - slow
  schedule:
    - cron: '0 6 * * *'  # Daily at 6am UTC

concurrency:
  group: e2e-tests
  cancel-in-progress: false

jobs:
  e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CANDIDATE_REF: ${{ github.event.inputs.candidate_ref || '' }}
      SOURCE_PR: ${{ github.event.inputs.source_pr || '' }}
      CERTIFICATION_STAGE: ${{ github.event.inputs.stage || 'all' }}
      SOURCE_REPOSITORY: scarowar/terraform-branch-deploy
      STATUS_CONTEXT_BASE: terraform-branch-deploy/e2e
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout test repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Validate dispatch inputs
        run: |
          case "${CERTIFICATION_STAGE}" in
            all|critical|core|stateful|args|edge|slow) ;;
            *)
              echo "::error::Unsupported stage: ${CERTIFICATION_STAGE}"
              exit 2
              ;;
          esac

          if [ -z "${CANDIDATE_REF}" ]; then
            if [ -n "${SOURCE_PR}" ]; then
              echo "::error::source_pr requires candidate_ref."
              exit 2
            fi
            exit 0
          fi

          case "${CANDIDATE_REF}" in
            main|master)
              echo "::error::candidate_ref must be a release tag or full commit SHA, not ${CANDIDATE_REF}."
              exit 2
              ;;
          esac

          if ! printf '%s' "${CANDIDATE_REF}" | grep -Eq '^(v[0-9]+(\.[0-9]+){0,2}(-[0-9A-Za-z.-]+)?|[0-9a-f]{40})$'; then
            echo "::error::candidate_ref must be a release tag or full 40-character commit SHA."
            exit 2
          fi

          if [ -n "${SOURCE_PR}" ] && ! printf '%s' "${SOURCE_PR}" | grep -Eq '^[0-9]+$'; then
            echo "::error::source_pr must be a pull request number."
            exit 2
          fi

      - name: Mark E2E status pending
        if: env.SOURCE_PR != '' && env.CANDIDATE_REF != ''
        env:
          GH_TOKEN: ${{ secrets.TFBD_STATUS_TOKEN }}
        run: |
          context="${STATUS_CONTEXT_BASE}"
          if [ "${CERTIFICATION_STAGE}" != "all" ]; then
            context="${STATUS_CONTEXT_BASE}-${CERTIFICATION_STAGE}"
          fi

          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "repos/${SOURCE_REPOSITORY}/statuses/${CANDIDATE_REF}" \
            -f state=pending \
            -f context="${context}" \
            -f description="External E2E ${CERTIFICATION_STAGE} started for PR #${SOURCE_PR}" \
            -f target_url="${RUN_URL}"

      - name: Run E2E Tests
        env:
          GITHUB_TOKEN: ${{ secrets.E2E_PAT }}
          TF_BRANCH_DEPLOY_REF: ${{ env.CANDIDATE_REF }}
        run: uv run python scripts/run-certification.py --live --cleanup-first --stage "${CERTIFICATION_STAGE}"

      - name: Mark E2E status complete
        if: always() && env.SOURCE_PR != '' && env.CANDIDATE_REF != ''
        env:
          GH_TOKEN: ${{ secrets.TFBD_STATUS_TOKEN }}
          JOB_STATUS: ${{ job.status }}
        run: |
          context="${STATUS_CONTEXT_BASE}"
          if [ "${CERTIFICATION_STAGE}" != "all" ]; then
            context="${STATUS_CONTEXT_BASE}-${CERTIFICATION_STAGE}"
          fi

          case "${JOB_STATUS}" in
            success)
              state="success"
              description="External E2E ${CERTIFICATION_STAGE} passed for PR #${SOURCE_PR}"
              ;;
            cancelled)
              state="error"
              description="External E2E ${CERTIFICATION_STAGE} cancelled for PR #${SOURCE_PR}"
              ;;
            *)
              state="failure"
              description="External E2E ${CERTIFICATION_STAGE} failed for PR #${SOURCE_PR}"
              ;;
          esac

          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "repos/${SOURCE_REPOSITORY}/statuses/${CANDIDATE_REF}" \
            -f state="${state}" \
            -f context="${context}" \
            -f description="${description}" \
            -f target_url="${RUN_URL}"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-test-results
          path: |
            .pytest_cache/
            *.log
          retention-days: 7
