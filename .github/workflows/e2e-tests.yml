name: E2E Tests
run-name: "E2E ${{ github.event.inputs.stage || 'critical' }} PR #${{ github.event.inputs.source_pr || 'scheduled' }} comment ${{ github.event.inputs.tracking_comment_id || github.run_id }}"

on:
  workflow_dispatch:
    inputs:
      candidate_ref:
        description: "Terraform Branch Deploy commit SHA or release tag. Empty uses the pinned test repo ref."
        required: false
        default: ""
      source_pr:
        description: "Terraform Branch Deploy pull request number for status reporting."
        required: false
        default: ""
      stage:
        description: "Certification stage."
        required: false
        default: "all"
        type: choice
        options:
          - all
          - critical
          - core
          - stateful
          - args
          - edge
          - slow
      tracking_comment_id:
        description: "Source PR issue comment id to update with E2E progress."
        required: false
        default: ""
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 6am UTC (critical stage only)

concurrency:
  group: e2e-tests
  cancel-in-progress: false

jobs:
  e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    env:
      CANDIDATE_REF: ${{ github.event.inputs.candidate_ref || '' }}
      SOURCE_PR: ${{ github.event.inputs.source_pr || '' }}
      CERTIFICATION_STAGE: ${{ github.event_name == 'schedule' && 'critical' || github.event.inputs.stage || 'all' }}
      TRACKING_COMMENT_ID: ${{ github.event.inputs.tracking_comment_id || '' }}
      SOURCE_REPOSITORY: scarowar/terraform-branch-deploy
      STATUS_CONTEXT_BASE: terraform-branch-deploy/e2e
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout test repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Resolve and validate dispatch inputs
        run: |
          case "${CERTIFICATION_STAGE}" in
            all|critical|core|stateful|args|edge|slow) ;;
            *)
              echo "::error::Unsupported stage: ${CERTIFICATION_STAGE}"
              exit 2
              ;;
          esac

          if [ -z "${CANDIDATE_REF}" ]; then
            if [ ! -f .github/terraform-branch-deploy-ref ]; then
              echo "::error::.github/terraform-branch-deploy-ref is required when candidate_ref is empty."
              exit 2
            fi
            CANDIDATE_REF="$(tr -d '[:space:]' < .github/terraform-branch-deploy-ref)"
          fi

          case "${CANDIDATE_REF}" in
            main|master)
              echo "::error::candidate_ref must be a release tag or full commit SHA, not ${CANDIDATE_REF}."
              exit 2
              ;;
          esac

          if ! printf '%s' "${CANDIDATE_REF}" | grep -Eq '^(v[0-9]+(\.[0-9]+){0,2}(-[0-9A-Za-z.-]+)?|[0-9a-f]{40})$'; then
            echo "::error::candidate_ref must be a release tag or full 40-character commit SHA."
            exit 2
          fi

          if [ -n "${SOURCE_PR}" ] && ! printf '%s' "${SOURCE_PR}" | grep -Eq '^[0-9]+$'; then
            echo "::error::source_pr must be a pull request number."
            exit 2
          fi

          if [ -n "${TRACKING_COMMENT_ID}" ] && ! printf '%s' "${TRACKING_COMMENT_ID}" | grep -Eq '^[0-9]+$'; then
            echo "::error::tracking_comment_id must be an issue comment id."
            exit 2
          fi

          {
            printf 'CANDIDATE_REF=%s\n' "${CANDIDATE_REF}"
            printf 'CERTIFICATION_STAGE=%s\n' "${CERTIFICATION_STAGE}"
          } >> "${GITHUB_ENV}"

      - name: Validate source PR status target
        if: env.SOURCE_PR != '' && env.CANDIDATE_REF != ''
        env:
          GH_TOKEN: ${{ secrets.TFBD_STATUS_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN}" ]; then
            echo "::error::TFBD_STATUS_TOKEN is required when source_pr is provided."
            exit 2
          fi

          pr_json="$(
            gh api \
              "repos/${SOURCE_REPOSITORY}/pulls/${SOURCE_PR}"
          )"
          state="$(jq -r '.state' <<< "${pr_json}")"
          base_ref="$(jq -r '.base.ref' <<< "${pr_json}")"
          head_sha="$(jq -r '.head.sha' <<< "${pr_json}")"

          if [ "${state}" != "open" ]; then
            echo "::error::Source pull request #${SOURCE_PR} is not open."
            exit 2
          fi

          if [ "${base_ref}" != "main" ]; then
            echo "::error::Source pull request #${SOURCE_PR} does not target main."
            exit 2
          fi

          if [ "${head_sha}" != "${CANDIDATE_REF}" ]; then
            echo "::error::candidate_ref does not match source pull request head."
            exit 2
          fi

          if [ -n "${TRACKING_COMMENT_ID}" ]; then
            comment_body="$(
              gh api \
                "repos/${SOURCE_REPOSITORY}/issues/comments/${TRACKING_COMMENT_ID}" \
                --jq '.body'
            )"
            if ! grep -Fq "terraform-branch-deploy-e2e:${SOURCE_PR}:" <<< "${comment_body}"; then
              echo "::error::tracking_comment_id does not belong to the source pull request E2E request."
              exit 2
            fi
            if ! grep -Fq -- "- Candidate: \`${CANDIDATE_REF}\`" <<< "${comment_body}"; then
              echo "::error::tracking_comment_id does not match candidate_ref."
              exit 2
            fi
          fi

      - name: Set up Python
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Mark E2E status pending
        if: env.SOURCE_PR != '' && env.CANDIDATE_REF != ''
        env:
          GH_TOKEN: ${{ secrets.TFBD_STATUS_TOKEN }}
        run: |
          context="${STATUS_CONTEXT_BASE}"
          if [ "${CERTIFICATION_STAGE}" != "all" ]; then
            context="${STATUS_CONTEXT_BASE}-${CERTIFICATION_STAGE}"
          fi

          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "repos/${SOURCE_REPOSITORY}/statuses/${CANDIDATE_REF}" \
            -f state=pending \
            -f context="${context}" \
            -f description="External E2E ${CERTIFICATION_STAGE} started for PR #${SOURCE_PR}" \
            -f target_url="${RUN_URL}"

      - name: Update E2E comment running
        if: env.SOURCE_PR != '' && env.CANDIDATE_REF != '' && env.TRACKING_COMMENT_ID != ''
        env:
          GH_TOKEN: ${{ secrets.TFBD_STATUS_TOKEN }}
        run: |
          comment_file="${RUNNER_TEMP}/tfbd-e2e-comment.md"
          cat > "${comment_file}" <<EOF
          ### External E2E

          - Stage: \`${CERTIFICATION_STAGE}\`
          - Candidate: \`${CANDIDATE_REF}\`
          - Run: ${RUN_URL}
          - Status: running

          External E2E workflow is running.

          <!-- terraform-branch-deploy-e2e:${SOURCE_PR}:${TRACKING_COMMENT_ID} -->
          EOF

          jq -n --rawfile body "${comment_file}" '{body: $body}' |
            gh api \
              --method PATCH \
              "repos/${SOURCE_REPOSITORY}/issues/comments/${TRACKING_COMMENT_ID}" \
              --input - >/dev/null

      - name: Run E2E Tests
        env:
          GITHUB_TOKEN: ${{ secrets.E2E_PAT }}
          TF_BRANCH_DEPLOY_REF: ${{ env.CANDIDATE_REF }}
          # Attribute E2E commits to a real GitHub login so branch-deploy's
          # committer safety check can resolve it (a synthetic email has no
          # login and warns on every run - github/branch-deploy#379).
          E2E_COMMIT_AUTHOR_NAME: scarowar
          E2E_COMMIT_AUTHOR_EMAIL: 62673499+scarowar@users.noreply.github.com
        run: uv run python scripts/run-certification.py --live --cleanup-first --stage "${CERTIFICATION_STAGE}"

      - name: Mark E2E status complete
        if: always() && env.SOURCE_PR != '' && env.CANDIDATE_REF != ''
        env:
          GH_TOKEN: ${{ secrets.TFBD_STATUS_TOKEN }}
          JOB_STATUS: ${{ job.status }}
        run: |
          context="${STATUS_CONTEXT_BASE}"
          if [ "${CERTIFICATION_STAGE}" != "all" ]; then
            context="${STATUS_CONTEXT_BASE}-${CERTIFICATION_STAGE}"
          fi

          case "${JOB_STATUS}" in
            success)
              state="success"
              description="External E2E ${CERTIFICATION_STAGE} passed for PR #${SOURCE_PR}"
              ;;
            cancelled)
              state="error"
              description="External E2E ${CERTIFICATION_STAGE} cancelled for PR #${SOURCE_PR}"
              ;;
            *)
              state="failure"
              description="External E2E ${CERTIFICATION_STAGE} failed for PR #${SOURCE_PR}"
              ;;
          esac

          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "repos/${SOURCE_REPOSITORY}/statuses/${CANDIDATE_REF}" \
            -f state="${state}" \
            -f context="${context}" \
            -f description="${description}" \
            -f target_url="${RUN_URL}"

          if [ -n "${TRACKING_COMMENT_ID}" ]; then
            comment_file="${RUNNER_TEMP}/tfbd-e2e-comment.md"
            cat > "${comment_file}" <<EOF
          ### External E2E

          - Stage: \`${CERTIFICATION_STAGE}\`
          - Candidate: \`${CANDIDATE_REF}\`
          - Run: ${RUN_URL}
          - Status: ${state}

          ${description}.

          <!-- terraform-branch-deploy-e2e:${SOURCE_PR}:${TRACKING_COMMENT_ID} -->
          EOF

            jq -n --rawfile body "${comment_file}" '{body: $body}' |
              gh api \
                --method PATCH \
                "repos/${SOURCE_REPOSITORY}/issues/comments/${TRACKING_COMMENT_ID}" \
                --input - >/dev/null || true
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-test-results
          path: |
            results/
            *.log
          if-no-files-found: warn
          retention-days: 7

      # Scheduled runs have no source PR to report status on, so a failure
      # would otherwise go unnoticed. Alert the maintainer through an issue
      # in this repo (deduped via the e2e-alert label). Dispatch runs are
      # watched interactively and already update PR statuses.
      - name: Alert maintainer on scheduled failure
        if: failure() && github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          gh label create e2e-alert \
            --repo "${GITHUB_REPOSITORY}" \
            --description "Scheduled E2E certification failure" \
            --color D93F0B \
            --force

          existing="$(
            gh issue list \
              --repo "${GITHUB_REPOSITORY}" \
              --state open \
              --label e2e-alert \
              --json number \
              --jq '.[0].number // empty'
          )"

          body_file="${RUNNER_TEMP}/tfbd-e2e-alert.md"
          cat > "${body_file}" <<EOF
          @scarowar Scheduled E2E certification deviated from expected behavior.

          - Stage: \`${CERTIFICATION_STAGE}\`
          - Candidate: \`${CANDIDATE_REF:-unresolved}\`
          - Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          - Run: ${RUN_URL}
          EOF

          if [ -n "${existing}" ]; then
            gh issue comment "${existing}" \
              --repo "${GITHUB_REPOSITORY}" \
              --body-file "${body_file}"
          else
            gh issue create \
              --repo "${GITHUB_REPOSITORY}" \
              --title "Scheduled E2E failure (${CERTIFICATION_STAGE})" \
              --label e2e-alert \
              --body-file "${body_file}"
          fi
