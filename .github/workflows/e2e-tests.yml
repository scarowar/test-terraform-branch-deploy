name: E2E Tests

on:
  workflow_dispatch:
    inputs:
      candidate_ref:
        description: "Terraform Branch Deploy commit SHA or release tag. Empty uses the existing test repo ref."
        required: false
        default: ""
      source_pr:
        description: "Terraform Branch Deploy pull request number for status reporting."
        required: false
        default: ""
      stage:
        description: "Certification stage."
        required: false
        default: "all"
        type: choice
        options:
          - all
          - critical
          - core
          - stateful
          - args
          - edge
          - slow
  schedule:
    - cron: '0 6 * * *'  # Daily at 6am UTC

concurrency:
  group: e2e-tests
  cancel-in-progress: false

jobs:
  e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CANDIDATE_REF: ${{ github.event.inputs.candidate_ref || '' }}
      SOURCE_PR: ${{ github.event.inputs.source_pr || '' }}
      CERTIFICATION_STAGE: ${{ github.event.inputs.stage || 'all' }}
      SOURCE_REPOSITORY: scarowar/terraform-branch-deploy
      STATUS_CONTEXT: terraform-branch-deploy/e2e
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - name: Checkout test repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@4f41a90a1f38628c7ccc608d05fbafe701bc20ae # v5.3.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@803947b9bd8e9f986429fa0c5a41c367cd732b41 # v7.2.1

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Validate dispatch inputs
        run: |
          case "${CERTIFICATION_STAGE}" in
            all|critical|core|stateful|args|edge|slow) ;;
            *)
              echo "::error::Unsupported stage: ${CERTIFICATION_STAGE}"
              exit 2
              ;;
          esac

          if [ -z "${CANDIDATE_REF}" ]; then
            if [ -n "${SOURCE_PR}" ]; then
              echo "::error::source_pr requires candidate_ref."
              exit 2
            fi
            exit 0
          fi

          case "${CANDIDATE_REF}" in
            main|master)
              echo "::error::candidate_ref must be a release tag or full commit SHA, not ${CANDIDATE_REF}."
              exit 2
              ;;
          esac

          if ! printf '%s' "${CANDIDATE_REF}" | grep -Eq '^(v[0-9]+(\.[0-9]+){0,2}(-[0-9A-Za-z.-]+)?|[0-9a-f]{40})$'; then
            echo "::error::candidate_ref must be a release tag or full 40-character commit SHA."
            exit 2
          fi

          if [ -n "${SOURCE_PR}" ] && ! printf '%s' "${SOURCE_PR}" | grep -Eq '^[0-9]+$'; then
            echo "::error::source_pr must be a pull request number."
            exit 2
          fi

      - name: Capture current candidate ref
        id: previous-ref
        if: env.CANDIDATE_REF != ''
        env:
          GITHUB_TOKEN: ${{ secrets.E2E_PAT }}
          GH_TOKEN: ${{ secrets.E2E_PAT }}
        run: |
          set +e
          previous_ref="$(gh variable get TF_BRANCH_DEPLOY_REF --repo "${GITHUB_REPOSITORY}" 2>/dev/null)"
          exit_code="$?"
          set -e

          if [ "${exit_code}" -eq 0 ]; then
            {
              echo "exists=true"
              echo "value<<EOF"
              printf '%s\n' "${previous_ref}"
              echo "EOF"
            } >> "${GITHUB_OUTPUT}"
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Set candidate ref
        if: env.CANDIDATE_REF != ''
        env:
          GH_TOKEN: ${{ secrets.E2E_PAT }}
        run: gh variable set TF_BRANCH_DEPLOY_REF --repo "${GITHUB_REPOSITORY}" --body "${CANDIDATE_REF}"

      - name: Mark E2E status pending
        if: env.SOURCE_PR != '' && env.CANDIDATE_REF != ''
        env:
          GH_TOKEN: ${{ secrets.TFBD_STATUS_TOKEN }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "repos/${SOURCE_REPOSITORY}/statuses/${CANDIDATE_REF}" \
            -f state=pending \
            -f context="${STATUS_CONTEXT}" \
            -f description="External E2E ${CERTIFICATION_STAGE} started for PR #${SOURCE_PR}" \
            -f target_url="${RUN_URL}"

      - name: Run E2E Tests
        env:
          GITHUB_TOKEN: ${{ secrets.E2E_PAT }}
        run: python3 scripts/run-certification.py --live --cleanup-first --stage "${CERTIFICATION_STAGE}"

      - name: Restore candidate ref
        if: always() && env.CANDIDATE_REF != ''
        env:
          GH_TOKEN: ${{ secrets.E2E_PAT }}
          PREVIOUS_REF: ${{ steps.previous-ref.outputs.value }}
        run: |
          if [ "${{ steps.previous-ref.outputs.exists }}" = "true" ]; then
            gh variable set TF_BRANCH_DEPLOY_REF --repo "${GITHUB_REPOSITORY}" --body "${PREVIOUS_REF}"
          else
            gh variable delete TF_BRANCH_DEPLOY_REF --repo "${GITHUB_REPOSITORY}" || true
          fi

      - name: Mark E2E status complete
        if: always() && env.SOURCE_PR != '' && env.CANDIDATE_REF != ''
        env:
          GH_TOKEN: ${{ secrets.TFBD_STATUS_TOKEN }}
          JOB_STATUS: ${{ job.status }}
        run: |
          case "${JOB_STATUS}" in
            success)
              state="success"
              description="External E2E ${CERTIFICATION_STAGE} passed for PR #${SOURCE_PR}"
              ;;
            cancelled)
              state="error"
              description="External E2E ${CERTIFICATION_STAGE} cancelled for PR #${SOURCE_PR}"
              ;;
            *)
              state="failure"
              description="External E2E ${CERTIFICATION_STAGE} failed for PR #${SOURCE_PR}"
              ;;
          esac

          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "repos/${SOURCE_REPOSITORY}/statuses/${CANDIDATE_REF}" \
            -f state="${state}" \
            -f context="${STATUS_CONTEXT}" \
            -f description="${description}" \
            -f target_url="${RUN_URL}"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: e2e-test-results
          path: |
            .pytest_cache/
            *.log
          retention-days: 7
