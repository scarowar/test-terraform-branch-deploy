name: E2E Tests

on:
  workflow_dispatch:
    inputs:
      test_filter:
        description: 'Test filter (e.g., "test_basic" or "chaos")'
        required: false
        default: ""
  schedule:
    - cron: '0 6 * * *'  # Daily at 6am UTC

concurrency:
  group: e2e-tests
  cancel-in-progress: false

jobs:
  e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout test repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@4f41a90a1f38628c7ccc608d05fbafe701bc20ae # v5.3.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@803947b9bd8e9f986429fa0c5a41c367cd732b41 # v7.2.1

      - name: Install dependencies
        run: uv sync --dev

      - name: Run E2E Tests
        env:
          GITHUB_TOKEN: ${{ secrets.E2E_PAT }}
          TEST_FILTER: ${{ github.event.inputs.test_filter }}
        run: |
          if [ -n "${TEST_FILTER}" ]; then
            uv run pytest tests/e2e/ -v --tb=long -k "${TEST_FILTER}"
          else
            uv run pytest tests/e2e/ -v --tb=long
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: e2e-test-results
          path: |
            .pytest_cache/
            *.log
          retention-days: 7
