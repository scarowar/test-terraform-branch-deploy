default-environment: dev
production-environments:
  - prod
stable-branch: main
defaults:
  plan-args:
    args:
      - "-parallelism=7"
environments:
  dev:
    working-directory: ./terraform/dev
    var-files:
      paths:
        - ../common.tfvars
        - dev.tfvars
  prod:
    working-directory: ./terraform/prod
    var-files:
      paths:
        - ../common.tfvars
        - prod.tfvars
